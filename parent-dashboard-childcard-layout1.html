<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Parental Control</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <!-- Modular CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/parent-dashboard.css">
    <link rel="stylesheet" href="components/buttons.css">
    <link rel="stylesheet" href="css/quick-lend.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="dashboard-container" id="app">
        <!-- Background gradient -->
        <div class="background-gradient"></div>

        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="parent-avatar">
                        <img src="assets/father-avatar.png" alt="Parent" class="avatar-image" id="parentAvatarImage">
                        <div class="status-indicator"></div>
                    </div>
                    <div class="header-text">
                        <span class="header-label">Parent View</span>
                        <h2 class="header-greeting" id="parentGreeting">Good Morning, Parth</h2>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="action-button" onclick="ParentDashboardHandlers.goToFamily()"
                        title="Family Management" data-tooltip="Family">
                        <span class="material-symbols-outlined">supervisor_account</span>
                    </button>
                    <button class="action-button" onclick="ParentDashboardHandlers.goToSettings()" title="Settings"
                        data-tooltip="Settings">
                        <span class="material-symbols-outlined">settings</span>
                    </button>
                    <button class="action-button notification-button"
                        onclick="ParentDashboardHandlers.showNotifications()" title="Notifications"
                        data-tooltip="Notifications">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="notification-badge"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Child Cards -->
            <div class="child-cards">
                <!-- Leo's Card -->
                <article class="child-card layout-1" style="position: relative; cursor: pointer;"
                    onclick="window.location.href='child-details.html?child=Leo'">
                    <div class="card-top">
                        <div class="child-avatar-wrapper">
                            <svg class="progress-ring" viewBox="0 0 100 100">
                                <circle class="progress-ring-bg" cx="50" cy="50" r="46"></circle>
                                <circle class="progress-ring-fill" cx="50" cy="50" r="46"
                                    style="stroke-dashoffset: 72;"></circle>
                            </svg>
                            <div class="child-avatar">
                                <img src="assets/child-leo.png" alt="Leo">
                            </div>
                        </div>
                        <div class="child-info">
                            <div class="child-header">
                                <h3 class="child-name">Leo</h3>
                                <div class="menu-wrapper">
                                    <button class="menu-button" title="Edit Rules"
                                        onclick="event.stopPropagation(); ParentDashboardHandlers.editRules('Leo')">
                                        <span class="material-symbols-outlined">tune</span>
                                    </button>
                                </div>
                            </div>
                            <div
                                style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                                <div class="activity-status idle" id="status-Leo">
                                    <div class="status-dot"></div>
                                    <span>Idle</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-actions" style="display: flex; gap: 12px; align-items: center;">
                        <div style="flex: 1; height: 48px; border-radius: 16px; border: 1px solid rgba(0, 0, 0, 0.08); background: transparent; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer;"
                            onclick="event.stopPropagation(); QuickLendHandlers.openModal();">
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="material-symbols-outlined"
                                    style="font-size: 18px; color: var(--color-text-secondary);">hourglass_top</span>
                                <span style="font-size: 14px; font-weight: 600; color: var(--color-text-primary);">Lend
                                    Device</span>
                            </div>
                            <label class="toggle-switch" style="transform: scale(0.9); margin-right: -4px;">
                                <input type="checkbox"
                                    onclick="event.stopPropagation(); QuickLendHandlers.openModal();">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="btn-primary-action" style="flex: 1; height: 48px;"
                            onclick="event.stopPropagation(); ParentDashboardHandlers.monitor('Leo')">
                            <span class="material-symbols-outlined">visibility</span>
                            Monitor
                        </button>
                    </div>
                </article>

                <!-- Mia's Card -->
                <article class="child-card layout-1" style="position: relative; cursor: pointer;"
                    onclick="window.location.href='child-details.html?child=Mia'">
                    <div class="card-top">
                        <div class="child-avatar-wrapper">
                            <svg class="progress-ring" viewBox="0 0 100 100">
                                <circle class="progress-ring-bg" cx="50" cy="50" r="46"></circle>
                                <circle class="progress-ring-fill" cx="50" cy="50" r="46"
                                    style="stroke-dashoffset: 231;"></circle>
                            </svg>
                            <div class="child-avatar">
                                <img src="assets/child-mia.png" alt="Mia">
                            </div>
                        </div>
                        <div class="child-info">
                            <div class="child-header">
                                <h3 class="child-name">Mia</h3>
                                <div class="menu-wrapper">
                                    <button class="menu-button" title="Edit Rules"
                                        onclick="event.stopPropagation(); ParentDashboardHandlers.editRules('Mia')">
                                        <span class="material-symbols-outlined">tune</span>
                                    </button>
                                </div>
                            </div>
                            <div
                                style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                                <div class="activity-status idle" id="status-Mia">
                                    <div class="status-dot"></div>
                                    <span>Idle</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-actions" style="display: flex; gap: 12px; align-items: center;">
                        <div style="flex: 1; height: 48px; border-radius: 16px; border: 1px solid rgba(0, 0, 0, 0.08); background: transparent; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer;"
                            onclick="event.stopPropagation(); QuickLendHandlers.openModal();">
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="material-symbols-outlined"
                                    style="font-size: 18px; color: var(--color-text-secondary);">hourglass_top</span>
                                <span style="font-size: 14px; font-weight: 600; color: var(--color-text-primary);">Lend
                                    Device</span>
                            </div>
                            <label class="toggle-switch" style="transform: scale(0.9); margin-right: -4px;">
                                <input type="checkbox"
                                    onclick="event.stopPropagation(); QuickLendHandlers.openModal();">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="btn-primary-action" style="flex: 1; height: 48px;"
                            onclick="event.stopPropagation(); ParentDashboardHandlers.monitor('Mia')">
                            <span class="material-symbols-outlined">visibility</span>
                            Monitor
                        </button>
                    </div>
                </article>

                <!-- Add Child Button -->
                <button class="add-child-button" onclick="ParentDashboardHandlers.addChild()">
                    <span class="material-symbols-outlined">add_circle</span>
                    Add Child Profile
                </button>
            </div>
        </main>

        <!-- Floating Help Button -->
        <button class="floating-help-button" onclick="ParentDashboardHandlers.showHelp()" title="Guided Tour">
            <span class="material-symbols-outlined">help</span>
        </button>

        <!-- Theme toggle -->
        <button class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle dark mode">
            <span class="material-symbols-outlined">dark_mode</span>
        </button>
    </div>

    <!-- Quick Lend Modal -->
    <div id="quick-lend-modal" class="quick-lend-modal-overlay" onclick="QuickLendHandlers.closeModal()">
        <div class="quick-lend-modal" onclick="event.stopPropagation()">

            <div class="ql-icon">
                <span class="material-symbols-outlined">hourglass_top</span>
            </div>

            <h2 class="ql-title">Quick Lend</h2>
            <p class="ql-subtitle">Add bonus time instantly</p>

            <!-- Default Time Selector -->
            <div id="ql-selector-container"
                style="display: flex; flex-direction: column; width: 100%; align-items: center;">
                <div class="ql-time-selector" style="flex-wrap: wrap;">
                    <button class="ql-time-btn active" data-minutes="30"
                        onclick="QuickLendHandlers.selectTime(30, this)">
                        <span class="val">30</span>
                        <span class="unit">MIN</span>
                    </button>
                    <button class="ql-time-btn" data-minutes="60" onclick="QuickLendHandlers.selectTime(60, this)">
                        <span class="val">1</span>
                        <span class="unit">HR</span>
                    </button>
                    <button class="ql-time-btn" data-minutes="120" onclick="QuickLendHandlers.selectTime(120, this)">
                        <span class="val">2</span>
                        <span class="unit">HR</span>
                    </button>
                    <button class="ql-time-btn" data-minutes="9999" id="btn-no-limit"
                        onclick="QuickLendHandlers.selectTime('unlimited', this)">
                        <span class="material-symbols-outlined val" style="font-size: 28px;">all_inclusive</span>
                        <span class="unit">NO LIMIT</span>
                    </button>
                </div>

                <!-- Custom time toggle button -->
                <button type="button" class="ql-custom-toggle-btn" onclick="QuickLendHandlers.toggleCustomTime()">
                    Custom Time
                </button>

                <!-- Custom Time Input -->
                <div id="ql-custom-input-wrapper" class="ql-custom-input-wrapper">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" id="ql-custom-hr-input" class="ql-custom-input" min="0" max="23" value="0"
                            placeholder="0" oninput="QuickLendHandlers.onCustomTimeInput()">
                        <span style="font-size: 14px; font-weight: 600; color: var(--color-text-secondary);">hr</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" id="ql-custom-min-input" class="ql-custom-input" min="0" max="59"
                            value="45" placeholder="00" oninput="QuickLendHandlers.onCustomTimeInput()">
                        <span style="font-size: 14px; font-weight: 600; color: var(--color-text-secondary);">min</span>
                    </div>
                </div>
            </div>

            <!-- Active Timer Container -->
            <div id="ql-active-container"
                style="display: none; width: 100%; align-items: center; flex-direction: column;">
                <div class="ql-active-timer-container">
                    <div class="ql-tick-icon">
                        <span class="material-symbols-outlined">check</span>
                    </div>
                    <div class="ql-timer-display">
                        <span class="time" id="ql-active-time-display">29 : 59</span>
                        <span class="label">Time Remaining</span>
                    </div>
                    <button class="ql-cancel-btn" onclick="QuickLendHandlers.cancelTimer()" title="Cancel">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>

            <div class="ql-footer">
                <button class="ql-history-btn" onclick="QuickLendHandlers.viewHistory()">
                    <span class="material-symbols-outlined" style="font-size: 18px;">history</span>
                    View History
                </button>
                <button class="ql-done-btn" onclick="QuickLendHandlers.handleDoneAction()">
                    Done
                </button>
            </div>

        </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="js/notifications.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/quick-lend.js"></script>
    <script src="js/parent-dashboard.js"></script>
</body>

</html>
